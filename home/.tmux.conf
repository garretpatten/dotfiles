# ~/.tmux.conf — modular themes via DOTFILES + DOTFILES_THEME (see docs/themes/README.md)
#
# Requires DOTFILES and DOTFILES_THEME in the environment (set from ~/.zshrc + theme-env.sh)
# when you start tmux from zsh. Fallback: ~/.dotfiles_path or $HOME/Projects/dotfiles.

run-shell 'df="${DOTFILES:-}"; [ -z "$df" ] && [ -f "${HOME}/.dotfiles_path" ] && df="$(head -n1 "${HOME}/.dotfiles_path")"; df="${df:-${HOME}/Projects/dotfiles}"; tm="${DOTFILES_THEME:-gruvbox}"; tmux source-file "$df/config/tmux/includes/base.conf" && tmux source-file "$df/config/tmux/themes/${tm}.conf"'
