### Key Bindings ###

# Reload Tmux Configuration
unbind r
bind r source-file ~/.tmux.conf

# Pane Navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

### Settings ###

# Clock
set-option -g clock-mode-style 12

# Mouse
set -g mouse off

### Theme - Gruvbox Dark Hard (hex from ~/.config/ghostty/themes/gruvbox-dark-hard-contrast) ###

set -g status-justify "centre"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#a89984,bg=#504945"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#b8bb26"
set -g status-style "none,bg=#3c3836"
set -g message-style "fg=#a89984,bg=#504945"
set -g pane-border-style "fg=#504945"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg=#b8bb26,bg=#3c3836"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#a89984,bg=#3c3836"
set -g status-left "#[fg=#1d2021,bg=#b8bb26] #S #[fg=#b8bb26,bg=#504945,nobold,nounderscore,noitalics]#[fg=#a89984,bg=#504945] %R #[fg=#504945,bg=#3c3836,nobold,nounderscore,noitalics]#[fg=#928374,bg=#3c3836] #{sysstat_mem} #[fg=#83a598]#{sysstat_ntemp} #(~/.tmux/tmuxline/widget-color.sh)󰕒 #{upload_speed} #[fg=#3c3836,bg=#3c3836,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#3c3836,bg=#3c3836,nobold,nounderscore,noitalics]#[fg=#928374,bg=#3c3836] #(~/.tmux/tmuxline/widget-color.sh)#{download_speed} 󰇚 #[fg=#83a598]#{sysstat_itemp} #{sysstat_cpu} #[fg=#504945,bg=#3c3836,nobold,nounderscore,noitalics]#[fg=#a89984,bg=#504945] %a #[fg=#b8bb26,bg=#504945,nobold,nounderscore,noitalics]#[fg=#1d2021,bg=#b8bb26] #H #{prefix_highlight} "
setw -g window-status-format "#[fg=#3c3836,bg=#3c3836,nobold,nounderscore,noitalics]#[fg=#a89984] #I  #W #[fg=#3c3836,bg=#3c3836,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#3c3836,bg=#504945,nobold,nounderscore,noitalics]#[fg=#a89984,bg=#504945] #I  #W  #F #[fg=#504945,bg=#3c3836,nobold,nounderscore,noitalics]"

### Tmux Plugin Manager ###

# List of Plugins
set -g @plugin 'tmux-plugins/tpm'

# Initialize TMUX Plugin Manager
run '~/.tmux/plugins/tpm/tpm'
