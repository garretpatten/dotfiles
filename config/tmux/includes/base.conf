### Key Bindings ###

# Reload Tmux Configuration
unbind r
bind r source-file ~/.tmux.conf

# Pane Navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

### Settings ###

# Clock
set-option -g clock-mode-style 12

# Mouse — must be "on" for touchpad/wheel scrolling inside tmux on macOS.
# Ghostty in alternate-screen mode otherwise translates wheel events into ↑/↓
# (arrow keys). With zsh bindkey on ^[[A/^[[B that walks shell history instead of
# the terminal scrollback. See: docs/themes/README.md
set -g mouse on

set-option -g focus-events on

### Theme colors (requires ~/.config/tmux from dotfiles; see README)
source-file ~/.config/tmux/themes/gruvbox.conf

### Tmux Plugin Manager ###

# List of Plugins
set -g @plugin 'tmux-plugins/tpm'

# Initialize TMUX Plugin Manager (must stay last in this file)
run '~/.tmux/plugins/tpm/tpm'
