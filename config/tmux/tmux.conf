### Key Bindings ###

# Reload Tmux Configuration
unbind r
bind r source-file ~/.tmux.conf

# Pane Navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

### Settings ###

# Clock
set-option -g clock-mode-style 12

# Mouse — must be "on" for touchpad/wheel scrolling inside tmux on macOS.
# Ghostty in alternate-screen mode otherwise translates wheel events into ↑/↓
# (arrow keys). With zsh bindkey on ^[[A/^[[B that walks shell history instead of
# the terminal scrollback. See: docs/themes/README.md
set -g mouse on

### Theme — Gruvbox dark hard (TerminalColors-aligned)

set -g status-justify "centre"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#ebdbb2,bg=#665c54"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#b8bb26"
set -g status-style "none,bg=#504945"
set -g message-style "fg=#ebdbb2,bg=#665c54"
set -g pane-border-style "fg=#665c54"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg=#fabd2f,bg=#504945"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#928374,bg=#504945"
set -g status-left "#[fg=#1d2021,bg=#fabd2f] #S #[fg=#fabd2f,bg=#665c54,nobold,nounderscore,noitalics]#[fg=#ebdbb2,bg=#665c54] %R #[fg=#665c54,bg=#504945,nobold,nounderscore,noitalics]#[fg=#928374,bg=#504945] #{sysstat_mem} #[fg=blue]#{sysstat_ntemp} #(~/.tmux/tmuxline/widget-color.sh)󰕒 #{upload_speed} #[fg=#504945,bg=#504945,nobold,nounderscore,noitalics]"
# Far-right hostname segment uses the same bright yellow as the session bookend (#fabd2f).
set -g status-right "#[fg=#504945,bg=#504945,nobold,nounderscore,noitalics]#[fg=#928374,bg=#504945] #(~/.tmux/tmuxline/widget-color.sh)#{download_speed} 󰇚 #[fg=blue]#{sysstat_itemp} #{sysstat_cpu} #[fg=#665c54,bg=#504945,nobold,nounderscore,noitalics]#[fg=#ebdbb2,bg=#665c54] %a #[fg=#fabd2f,bg=#665c54,nobold,nounderscore,noitalics]#[fg=#1d2021,bg=#fabd2f] #H #{prefix_highlight} "
setw -g window-status-format "#[fg=#504945,bg=#504945,nobold,nounderscore,noitalics]#[fg=#928374] #I  #W #[fg=#504945,bg=#504945,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#504945,bg=#665c54,nobold,nounderscore,noitalics]#[fg=#ebdbb2,bg=#665c54] #I  #W  #F #[fg=#665c54,bg=#504945,nobold,nounderscore,noitalics]"

### Tmux Plugin Manager ###

# List of Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

# Initialize TMUX Plugin Manager (must stay last in this file)
run '~/.config/tmux/plugins/tpm/tpm'
