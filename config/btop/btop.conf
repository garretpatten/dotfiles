# Apply the theme
color_theme = "everforest_dark_hard.theme"

# Logical Display Adjustments
vim_keys = True              # Mandatory for your workflow
rounded_corners = True       # Matches MesloLGS/Ghostty aesthetic
graph_symbol = "braille"     # Highest resolution for M3 Air display
presets = "cpu:0:default,mem:0:default,net:0:default,proc:0:default"

# Functional Density
shown_boxes = "cpu mem net proc"
update_ms = 1000             # 1s refresh for clinical accuracy
proc_sorting = "cpu lazy"    # Keeps high-impact processes at the top
proc_tree = True             # Logical parent/child process view
net_download = 100           # Scaled for modern bandwidth
net_upload = 100

# Aesthetic Cleanup
background_update = True
clock_format = "%H:%M:%S"
show_uptime = True
